packages:
  "framer-motion": "For smooth page transitions, stagger animations, and interactive hover effects essential for the premium feel."
  "recharts": "For rendering beautiful, responsive charts on the Progress and Dashboard pages."
  "date-fns": "For formatting and manipulating dates in the Study Planner."
  "clsx": "Utility for constructing className strings conditionally."
  "tailwind-merge": "Utility for merging tailwind classes safely."

