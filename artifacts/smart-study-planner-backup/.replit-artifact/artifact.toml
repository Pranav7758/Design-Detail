kind = "web"
previewPath = "/old-backup/"
title = "Smart Study Planner"
version = "1.0.0"
id = "artifacts/smart-study-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/old-backup/" ]
localPort = 20490

[services.development]
run = "pnpm --filter @workspace/smart-study-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-study-planner", "run", "build" ]
publicDir = "artifacts/smart-study-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20490"
BASE_PATH = "/old-backup/"
